<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

  <style>
    table{
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td{
      border: 1px solid #CCCCCC;
    }

    th, td {
      padding: 10px;
      text-align: center;
      vertical-align: middle;
    }
    /* 가상(pseudo) 클래스 */
    tr:hover { /* tr 태그에 마우스가 영역 안으로 들어 오면 ... */
      background: #f5f5f5;

    }
  </style>
</head>
<body>
<div>
    <table>
        <thead>
        <tr>
            <th>아이디</th>
            <th>상품명</th>
            <th>단가</th>
        </tr>
        </thead>



        <tbody>
        <tr>
            <td>1</td>
            <td>사과</td>
            <td>3,000</td>
        </tr>

      <tr>
        <td>2</td>
        <td>바나나</td>
        <td>2,500</td>
      </tr>

      <tr>
        <td>3</td>
        <td>딸기</td>
        <td>5,000</td>
      </tr>
        </tbody>

    </table>
</div>
</body>
</html>
