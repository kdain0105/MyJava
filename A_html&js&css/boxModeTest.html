<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      div{
        border: 1px solid black;
        width: 100px;
        height: 100px;
        position: absolute;
      }
      #mydiv {
        top: 10px;
        left: 10px;
        width: 300px;
        height: 300px;
        background: white;
        border: 1px solid red;
        position: relative;
      }
        .test1{
          top: 20px;
          left: 0px;
          background: aqua;
        }
        .test2{
          top: 50px;
          left: 150px;
          background: fuchsia;
        }
      .test3{
        bottom: 50px;
        left: 20px;
        background: yellow;
      }
      .test4{
        bottom: 20px;
        left: 105px;
        background: blue;
      }


    </style>
</head>
<body>

<div id="mydiv">
  <div class="test1">소녀 시대</div>
  <div class="test2">원더 걸스</div>
  <div class="test3">하투하</div>
  <div class="test4">아이브</div>

</div>

</body>
</html>
