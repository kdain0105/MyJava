<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div id="output"></div>

    <script>
        let output = document.getElementById("output");

        let mytitle = '자바스크립트';
        output.innerHTML += '타이틀 : ' + mytitle + '<br>';

        let myname; /*변수 정의만 되어 있으며 undefined가 됨*/
        output.innerHTML += '타이틀 : ' + myname + '<br>';

        let num = 1;
        let str = "1";

        /* ==는 값만 비교, ===는 값과 타입을 모두 비교 */
        output.innerHTML += '== 비교 : ' + (num == str) + '<br>';
        output.innerHTML += '=== 비교 : ' + (num === str) + '<br>';

        if(myname === undefined){
            output.innerHTML += '결과 : no<br>';
        }else{
            output.innerHTML += '결과 : yes<br>';
        }

        myname = "김철수";
        output.innerHTML += '이름(값할당) :' + myname + '<br>';

        const pi = 3.14; // 편집 불가능
        output.innerHTML += 'pi : ' + pi + '<br>';

        /* 중괄호는 무조건 객체입니다. */
        const hong = { name: '홍길동'};
        output.innerHTML += '객체의 이름 : ' + hong.name + '<br>';

        const members = ['이아리', '김남섭', '이창희'];
        output.innerHTML += '배열의 0번째 요소 : ' + members[0] + '<br>';
        output.innerHTML += '배열의 3번째 요소 : ' + members[3] + '<br>';

    </script>

</body>
</html>
